<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="62%" cy="22%" r="90%">
      <stop offset="0%" stop-color="#14283a"/>
      <stop offset="60%" stop-color="#0a1018"/>
    </radialGradient>
    <linearGradient id="wave" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2dd4bf"/>
      <stop offset="100%" stop-color="#4aa3ff"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="104" fill="url(#bg)"/>
  <rect x="6" y="6" width="500" height="500" rx="98" fill="none" stroke="#1e2d3d" stroke-width="3"/>
  <!-- the wave the wall holds back -->
  <path d="M70 330 C120 250 170 380 220 300 C270 220 320 360 370 280 C400 232 420 300 442 286"
        fill="none" stroke="url(#wave)" stroke-width="22" stroke-linecap="round"/>
  <!-- the seawall (the guardian) -->
  <rect x="232" y="150" width="40" height="250" rx="14" fill="#f5b942"/>
  <!-- waterline / the protected base -->
  <rect x="120" y="392" width="272" height="34" rx="17" fill="#4aa3ff"/>
  <text x="256" y="470" font-family="ui-sans-serif,system-ui,sans-serif" font-size="46" font-weight="700"
        fill="#dce8f2" text-anchor="middle" letter-spacing="2">SEAWALL</text>
</svg>
