[package]
name = "guardian"
edition = "2024.beta"

# Dependency set lifted verbatim from the de-risk probe that compiled green on
# 2026-06-08 (see /home/sui-overflow/derisk/RESULTS.md): Pyth + deepbook only.
# Wormhole + the Sui framework + MoveStdlib are pulled in TRANSITIVELY through
# Pyth with no version conflict, so we do NOT list Wormhole explicitly (adding it
# risks a duplicate-framework conflict). The Sui framework rev that Pyth resolves
# matches CLI 1.73.1 (commit ff1fe0ec…); re-pull HEADs + commit Move.lock on
# deploy day — the Pyth/Wormhole branches float.
[dependencies]
Pyth     = { git = "https://github.com/pyth-network/pyth-crosschain.git", subdir = "target_chains/sui/contracts", rev = "sui-contract-testnet" }
deepbook = { local = "vendor/deepbook" }
# NOTE: dep KEY must equal the package's own name — sui 1.73 makes a mismatch a
# HARD error, not a warning (RESULTS.md gotcha #4). `deepbook` is lowercase;
# Pyth's package name is `Pyth`, so that key is capitalised.

[addresses]
guardian = "0x0"
