" y="40" width="420" height="480" rx="14" fill="#EAF4FF" stroke="#D8E0E8" stroke-width="1.5" stroke-dasharray="6 5"></rect><text x="640" y="62" font-family="system-ui, -apple-system, &#x27;Segoe UI&#x27;, Roboto, sans-serif" font-size="12" font-weight="700" letter-spacing="1" fill="#1f6fc2">ON-CHAIN · SUI (trust root)</text><rect x="1068" y="40" width="108" height="480" rx="14" fill="#F3EEFF" stroke="#D8E0E8" stroke-width="1.5" stroke-dasharray="6 5"></rect><text x="1084" y="62" font-family="system-ui, -apple-system, &#x27;Segoe UI&#x27;, Roboto, sans-serif" font-size="12" font-weight="700" letter-spacing="1" fill="#6B4DCB">DAO</text></g><g><path d="M 149 146 C 290 146, 290 535, 600 535 S 850 320, 850 318" fill="none" stroke="#B07A1E" stroke-width="1.5" stroke-dasharray="4 4" opacity="0.55" marker-end="url(#arch-arrow-amber)"></path><path d="M 149 236 C 290 236, 290 512, 600 512 S 820 318, 838 312" fill="none" stroke="#B07A1E" stroke-width="1.5" stroke-dasharray="4 4" opacity="0.55" marker-end="url(#arch-arrow-amber)"></path></g><g><rect x="44" y="90" width="210" height="56" rx="10" fill="#FFFFFF" stroke="#B07A1E" stroke-width="1.5"></rect><text x="149" y="113" text-anchor="middle" dominant-baseline="middle" font-family="system-ui, -apple-system, &#x27;Segoe UI&#x27;, Roboto, sans-serif" font-size="14" font-weight="600" fill="#0B1B2B">Pyth</text><text x="149" y="131" text-anchor="middle" dominant-baseline="middle" font-family="system-ui, -apple-system, &#x27;Segoe UI&#x27;, Roboto, sans-serif" font-size="11" font-weight="400" fill="#5A6B7B">signed price + conf</text></g><g><rect x="44" y="180" width="210" height="56" rx="10" fill="#FFFFFF" stroke="#B07A1E" stroke-width="1.5"></rect><text x="149" y="203" text-anchor="middle" dominant-baseline="middle" font-family="system-ui, -apple-system, &#x27;Segoe UI&#x27;, Roboto, sans-serif" font-size="14" font-weight="600" fill="#0B1B2B">DeepBook CLOB</text><text x="149" y="221" text-anchor="middle" dominant-baseline="middle" 