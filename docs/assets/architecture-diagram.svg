="183" text-anchor="middle" dominant-baseline="middle" font-family="system-ui, -apple-system, &#x27;Segoe UI&#x27;, Roboto, sans-serif" font-size="14" font-weight="600" fill="#0B1B2B">GuardianPolicy</text><text x="850" y="201" text-anchor="middle" dominant-baseline="middle" font-family="system-ui, -apple-system, &#x27;Segoe UI&#x27;, Roboto, sans-serif" font-size="11" font-weight="400" fill="#5A6B7B">shared · corridor + caps + state</text></g><g><rect x="700" y="262" width="300" height="56" rx="10" fill="#FFFFFF" stroke="#4DA2FF" stroke-width="1.5"></rect><text x="850" y="285" text-anchor="middle" dominant-baseline="middle" font-family="system-ui, -apple-system, &#x27;Segoe UI&#x27;, Roboto, sans-serif" font-size="14" font-weight="600" fill="#0B1B2B">divergence::read</text><text x="850" y="303" text-anchor="middle" dominant-baseline="middle" font-family="system-ui, -apple-system, &#x27;Segoe UI&#x27;, Roboto, sans-serif" font-size="11" font-weight="400" fill="#5A6B7B">re-derives div from raw Pyth+book</text></g><g><rect x="700" y="356" width="300" height="60" rx="10" fill="#FFFFFF" stroke="#0B1B2B" stroke-width="1.5"></rect><text x="850" y="381" text-anchor="middle" dominant-baseline="middle" font-family="system-ui, -apple-system, &#x27;Segoe UI&#x27;, Roboto, sans-serif" font-size="14" font-weight="600" fill="#0B1B2B">Vault (consumer)</text><text x="850" y="399" text-anchor="middle" dominant-baseline="middle" font-family="system-ui, -apple-system, &#x27;Segoe UI&#x27;, Roboto, sans-serif" font-size="11" font-weight="400" fill="#5A6B7B">borrow / withdraw — gated</text></g><g><rect x="1072" y="230" width="104" height="110" rx="10" fill="#FFFFFF" stroke="#6B4DCB" stroke-width="1.5"></rect><text x="1124" y="280" text-anchor="middle" dominant-baseline="middle" font-family="system-ui, -apple-system, &#x27;Segoe UI&#x27;, Roboto, sans-serif" font-size="14" font-weight="600" fill="#0B1B2B">GovernanceCap</text><text x="1124" y="298" text-anchor="middle" dominant-baseline="middle" font-family="system-ui, -apple-system, &#x27;Segoe UI&#x27;, Roboto, sans-serif" font-size="11" font-weight="400" fill="#5A6B7B">owned · separate object</text></g><g><rect x="320" y="432" width="260" height="56" rx="10" fill="#FFFFFF" stroke="#5A6B7B" stroke-width="1.5"></rect><text x="450" y="455" text-anchor="middle" dominant-baseline="middle" font-family="system-ui, -apple-system, &#x27;Segoe UI&#x27;, Roboto, sans-serif" font-size="14" font-weight="600" fill="#0B1B2B">Dashboard</text><text x="450" y="473" text-anchor="middle" dominant-baseline="middle" font-family="system-ui, -apple-system, &#x27;Segoe UI&#x27;, Roboto, sans-serif" font-size="11" font-weight="400" fill="#5A6B7B">gauge · action log</text></g><g fill="none"><path d="M 254 118 C 284 117, 300 116, 318 116" stroke="#B07A1E" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#arch-arrow-amber)"></path><path d="M 254 208 C 286 206, 304 150, 318 142" stroke="#B07A1E" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#arch-arrow-amber)"></path><path d="M 450 156 L 450 194" stroke="#0B1B2B" stroke-width="2" marker-end="url(#arch-arrow)"></path><path d="M 580 222 C 640 200, 660 188, 698 188" stroke="#4DA2FF" stroke-width="3" marker-end="url(#arch-arrow-blue)"></path><path d="M 580 344 C 650 330, 660 220, 698 210" stroke="#4DA2FF" stroke-width="2" marker-end="url(#arch-arrow-blue)"></path><path d="M 850 226 L 850 260" stroke="#4DA2FF" stroke-width="3" marker-end="url(#arch-arrow-blue)"></path><path d="M 760 356 C 740 320, 720 250, 730 228" stroke="#0B1B2B" stroke-width="2" marker-end="url(#arch-arrow)"></path><path d="M 1080 250 C 1040 230, 1020 200, 1002 192" stroke="#6B4DCB" stroke-width="2" marker-end="url(#arch-arrow-dao)"></path><path d="M 700 200 C 640 270, 640 440, 580 458" stroke="#5A6B7B" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#arch-arrow-soft)"></path></g><text x="286" y="104" text-anchor="middle" dominant-baseline="middle" font-family="system-ui, -apple-system, &#x27;Segoe UI&#x27;, Roboto, sans-serif" font-size="10.5" font-weight="500" fill="#8a5a0e" style="paint-order:stroke;stroke:#FFFFFF;stroke-width:3">signed price feed</text><text x="286" y="200" text-anchor="middle" dominant-baseline="middle" font-family="system-ui, -apple-system, &#x27;Segoe UI&#x27;, Roboto, sans-serif" font-size="10.5" font-weight="500" fill="#8a5a0e" style="paint-order:stroke;stroke:#FFFFFF;stroke-width:3">L2 book mid</text><text x="450" y="176" text-anchor="middle" dominant-baseline="middle" font-family="system-ui, -apple-system, &#x27;Segoe UI&#x27;, Roboto, sans-serif" font-size="10.5" font-weight="500" fill="#0B1B2B" style="paint-order:stroke;stroke:#FFFFFF;stroke-width:3">0–100 score (advisory)</text><text x="640" y="178" text-anchor="middle" dominant-baseline="middle" font-family="system-ui, -apple-system, &#x27;Segoe UI&#x27;, Roboto, sans-serif" font-size="10.5" font-weight="700" fill="#1f6fc2" style="paint-order:stroke;stroke:#FFFFFF;stroke-width:3">same-PTB: post Pyth update</text><text x="640" y="192" text-anchor="middle" dominant-baseline="middle" font-family="system-ui, -apple-system, &#x27;Segoe UI&#x27;, Roboto, sans-serif" font-size="10.5" font-weight="700" fill="#1f6fc2" style="paint-order:stroke;stroke:#FFFFFF;stroke-width:3">submit ParamRequest</text><text x="655" y="330" text-anchor="middle" dominant-baseline="middle" font-family="system-ui, -apple-system, &#x27;Segoe UI&#x27;, Roboto, sans-serif" font-size="10.5" font-weight="500" fill="#1f6fc2" style="paint-order:stroke;stroke:#FFFFFF;stroke-width:3">permissionless poke · 5 min</text><text x="905" y="244" text-anchor="middle" dominant-baseline="middle" font-family="system-ui, -apple-system, &#x27;Segoe UI&#x27;, Roboto, sans-serif" font-size="10.5" font-weight="700" fill="#1f6fc2" style="paint-order:stroke;stroke:#FFFFFF;stroke-width:3">reads price + L2 book ITSELF,</text><text x="905" y="257" text-anchor="middle" dominant-baseline="middle" font-family="system-ui, -apple-system, &#x27;Segoe UI&#x27;, Roboto, sans-serif" font-size="10.5" font-weight="700" fill="#1f6fc2" style="paint-order:stroke;stroke:#FFFFFF;stroke-width:3">re-derives divergence</text><text x="665" y="346" text-anchor="middle" dominant-baseline="middle" font-family="system-ui, -apple-system, &#x27;Segoe UI&#x27;, Roboto, sans-serif" font-size="10.5" font-weight="500" fill="#0B1B2B" style="paint-order:stroke;stroke:#FFFFFF;stroke-width:3">inline poke on borrow / withdraw</text><text x="1024" y="150" text-anchor="middle" dominant-baseline="middle" font-family="system-ui, -apple-system, &#x27;Segoe UI&#x27;, Roboto, sans-serif" font-size="10.5" font-weight="700" fill="#6B4DCB" style="paint-order:stroke;stroke:#FFFFFF;stroke-width:3">&amp;GovernanceCap:</text><text x="1024" y="164" text-anchor="middle" dominant-baseline="middle" font-family="system-ui, -apple-system, &#x27;Segoe UI&#x27;, Roboto, sans-serif" font-size="10.5" font-weight="700" fill="#6B4DCB" style="paint-order:stroke;stroke:#FFFFFF;stroke-width:3">unfreeze / set bounds / rotate agent</text><text x="636" y="400" text-anchor="middle" dominant-baseline="middle" font-family="system-ui, -apple-system, &#x27;Segoe UI&#x27;, Roboto, sans-serif" font-size="10.5" font-weight="500" fill="#5A6B7B" style="paint-order:stroke;stroke:#FFFFFF;stroke-width:3">events → dashboard (queryEvents)</text><text x="400" y="535" text-anchor="middle" dominant-baseline="middle" font-family="system-ui, -apple-system, &#x27;Segoe UI&#x27;, Roboto, sans-serif" font-size="10.5" font-weight="500" fill="#8a5a0e" style="paint-order:stroke;stroke:#FFFFFF;stroke-width:3">PriceInfoObject (same PTB)</text><text x="430" y="512" text-anchor="middle" dominant-baseline="middle" font-family="system-ui, -apple-system, &#x27;Segoe UI&#x27;, Roboto, sans-serif" font-size="10.5" font-weight="500" fill="#8a5a0e" style="paint-order:stroke;stroke:#FFFFFF;stroke-width:3">Pool L2 ticks (on-chain)</text><g transform="translate(0, -34)"><rect x="300" y="18" width="744" height="40" rx="12" fill="#FFF5F5" stroke="#E5484D" stroke-width="1.5"></rect><text x="672" y="32" text-anchor="middle" dominant-baseline="middle" font-family="system-ui, -apple-system, &#x27;Segoe UI&#x27;, Roboto, sans-serif" font-size="11" font-weight="700" fill="#c4203f">TRUST BOUNDARY — agent can only push safer (one-way ratchet) · cannot hold the unfreeze cap</text><text x="672" y="46" text-anchor="middle" dominant-baseline="middle" font-family="system-ui, -apple-system, &#x27;Segoe UI&#x27;, Roboto, sans-serif" font-size="11" font-weight="700" fill="#c4203f">freeze is contract-only · score is advisory (event-only)</text></g><g><g><rect x="672" y="432" width="328" height="20" rx="6" fill="#FFFFFF" stroke="#D8E0E8" stroke-width="1"></rect><rect x="672" y="432" width="4" height="20" rx="2" fill="#0B1B2B"></rect><text x="684" y="443" dominant-baseline="middle" font-family="system-ui, -apple-system, &#x27;Segoe UI&#x27;, Roboto, sans-serif" font-size="9.5" font-weight="700" fill="#0B1B2B">L1 · Inline floor — abort on freeze / LTV breach</text><text x="992" y="443" text-anchor="end" dominant-baseline="middle" font-family="system-ui, -apple-system, &#x27;Segoe UI&#x27;, Roboto, sans-serif" font-size="9" font-weight="400" font-style="italic" fill="#5A6B7B">any tx</text></g><g><rect x="672" y="456" width="328" height="20" rx="6" fill="#EAF4FF" stroke="#D8E0E8" stroke-width="1"></rect><rect x="672" y="456" width="4" height="20" rx="2" fill="#4DA2FF"></rect><text x="684" y="467" dominant-baseline="middle" font-family="system-ui, -apple-system, &#x27;Segoe UI&#x27;, Roboto, sans-serif" font-size="9.5" font-weight="700" fill="#0B1B2B">L2 · CAUTION — tighten max_ltv↓ / borrow_cap↓</text><text x="992" y="467" text-anchor="end" dominant-baseline="middle" font-family="system-ui, -apple-system, &#x27;Segoe UI&#x27;, Roboto, sans-serif" font-size="9" font-weight="400" font-style="italic" fill="#5A6B7B">agent · clamped</text></g><g><rect x="672" y="480" width="328" height="20" rx="6" fill="#FBEAEA" stroke="#D8E0E8" stroke-width="1"></rect><rect x="672" y="480" width="4" height="20" rx="2" fill="#E5484D"></rect><text x="684" y="491" dominant-baseline="middle" font-family="system-ui, -apple-system, &#x27;Segoe UI&#x27;, Roboto, sans-serif" font-size="9.5" font-weight="700" fill="#0B1B2B">L3 · FREEZE — halt borrow/withdraw</text><text x="992" y="491" text-anchor="end" dominant-baseline="middle" font-family="system-ui, -apple-system, &#x27;Segoe UI&#x27;, Roboto, sans-serif" font-size="9" font-weight="400" font-style="italic" fill="#5A6B7B">contract-only</text></g><text x="700" y="520" font-family="system-ui, -apple-system, &#x27;Segoe UI&#x27;, Roboto, sans-serif" font-size="10" font-weight="400" font-style="italic" fill="#5A6B7B">one signal — Pyth↔DeepBook divergence — three rungs; trust level decides who pulls each.</text></g><g><rect x="24" y="356" width="250" height="164" rx="10" fill="#FFFFFF" stroke="#D8E0E8" stroke-width="1"></rect><text x="38" y="376" font-family="system-ui, -apple-system, &#x27;Segoe UI&#x27;, Roboto, sans-serif" font-size="11" font-weight="700" letter-spacing="0.5" fill="#0B1B2B">LEGEND</text><g><line x1="38" y1="396" x2="58" y2="396" stroke="#0B1B2B" stroke-width="2" stroke-linecap="round"></line><text x="66" y="397" dominant-baseline="middle" font-family="system-ui, -apple-system, &#x27;Segoe UI&#x27;, Roboto, sans-serif" font-size="11" font-weight="400" fill="#0B1B2B">write / on-chain action</text></g><g><line x1="38" y1="413" x2="58" y2="413" stroke="#5A6B7B" stroke-width="1.5" stroke-dasharray="5 4" stroke-linecap="round"></line><text x="66" y="414" dominant-baseline="middle" font-family="system-ui, -apple-system, &#x27;Segoe UI&#x27;, Roboto, sans-serif" font-size="11" font-weight="400" fill="#0B1B2B">read (no state change)</text></g><g><line x1="38" y1="430" x2="58" y2="430" stroke="#4DA2FF" stroke-width="3" stroke-linecap="round"></line><text x="66" y="431" dominant-baseline="middle" font-family="system-ui, -apple-system, &#x27;Segoe UI&#x27;, Roboto, sans-serif" font-size="11" font-weight="400" fill="#0B1B2B">trust-critical path</text></g><g><rect x="38" y="441" width="14" height="12" rx="3" fill="#4DA2FF" stroke="#D8E0E8" stroke-width="1"></rect><text x="66" y="448" dominant-baseline="middle" font-family="system-ui, -apple-system, &#x27;Segoe UI&#x27;, Roboto, sans-serif" font-size="11" font-weight="400" fill="#0B1B2B">on-chain (trust root)</text></g><g><rect x="38" y="458" width="14" height="12" rx="3" fill="#F4F7FA" stroke="#D8E0E8" stroke-width="1"></rect><text x="66" y="465" dominant-baseline="middle" font-family="system-ui, -apple-system, &#x27;Segoe UI&#x27;, Roboto, sans-serif" font-size="11" font-weight="400" fill="#0B1B2B">off-chain (untrusted)</text></g><g><rect x="38" y="475" width="14" height="12" rx="3" fill="#FFF6E9" stroke="#D8E0E8" stroke-width="1"></rect><text x="66" y="482" dominant-baseline="middle" font-family="system-ui, -apple-system, &#x27;Segoe UI&#x27;, Roboto, sans-serif" font-size="11" font-weight="400" fill="#0B1B2B">external feed</text></g><g><rect x="38" y="492" width="14" height="12" rx="3" fill="#6B4DCB" stroke="#D8E0E8" stroke-width="1"></rect><text x="66" y="499" dominant-baseline="middle" font-family="system-ui, -apple-system, &#x27;Segoe UI&#x27;, Roboto, sans-serif" font-size="11" font-weight="400" fill="#0B1B2B">human / DAO authority</text></g></g></g></svg>
